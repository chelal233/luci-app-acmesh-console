# Build IPK packages for OpenWrt 24.10 and APK packages for OpenWrt SNAPSHOT.
name: Build release packages

on:
  workflow_dispatch:
    inputs:
      publish_run_id:
        description: "Existing workflow run ID whose package artifacts should be published"
        required: false
        type: string
      release_tag:
        description: "Existing tag to publish when publish_run_id is set"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: false

env:
  PACKAGE_NAME: luci-app-acmesh-console
  FEED_NAME: acmesh_console

jobs:
  metadata:
    name: Validate release metadata
    if: inputs.publish_run_id == ''
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
      release: ${{ steps.package.outputs.release }}
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Read package version
        id: package
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^PKG_VERSION:=//p' Makefile | head -n 1)"
          release="$(sed -n 's/^PKG_RELEASE:=//p' Makefile | head -n 1)"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([._+-][0-9A-Za-z._+-]+)?$ ]]
          [[ "$release" =~ ^[0-9]+$ ]]
          if [[ "$REF_TYPE" == tag && "$REF_NAME" != "v$version" ]]; then
            echo "Tag $REF_NAME must match Makefile PKG_VERSION v$version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target.format }} / ${{ matrix.arch }}
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_cortex-a7
          - arm_cortex-a9
          - mips_24kc
          - mipsel_24kc
          - riscv64_riscv64
          - x86_64
        target:
          - sdk: openwrt-24.10
            format: ipk
          - sdk: SNAPSHOT
            format: apk

    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Prepare standalone feed layout
        run: |
          set -euo pipefail
          feed_dir="$RUNNER_TEMP/acmesh-console-feed"
          package_dir="$feed_dir/$PACKAGE_NAME"
          mkdir -p "$package_dir"
          git archive HEAD | tar -x -C "$package_dir"
          echo "FEED_DIR=$feed_dir" >> "$GITHUB_ENV"

      - name: Build with the OpenWrt SDK
        uses: openwrt/gh-action-sdk@797d0e3d0eb13b355c3447f60d0179d4b43089e2
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.target.sdk }}
          BUILD_LOG: 1
          FEEDNAME: ${{ env.FEED_NAME }}
          NO_REFRESH_CHECK: 1
          PACKAGES: ${{ env.PACKAGE_NAME }}
          V: s

      - name: Collect and verify packages
        env:
          ARCH: ${{ matrix.arch }}
          FORMAT: ${{ matrix.target.format }}
          SDK: ${{ matrix.target.sdk }}
          VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE: ${{ needs.metadata.outputs.release }}
        run: |
          set -euo pipefail
          mkdir -p dist bundle
          mapfile -d '' packages < <(
            find bin/packages -type f \
              \( -name "luci-app-acmesh-console-*.${FORMAT}" \
                 -o -name "luci-i18n-acmesh-console-*.${FORMAT}" \) \
              -print0
          )
          if (( ${#packages[@]} == 0 )); then
            echo "No ${FORMAT} package was produced for ${ARCH}-${SDK}" >&2
            find bin/packages -maxdepth 4 -type f -print || true
            exit 1
          fi

          bundle_dir="bundle/${FORMAT}-${ARCH}"
          mkdir -p "$bundle_dir"
          for package in "${packages[@]}"; do
            filename="$(basename "$package")"
            stem="${filename%.${FORMAT}}"
            cp "$package" "$bundle_dir/$filename"
            cp "$package" "dist/${stem}_${SDK}_${ARCH}.${FORMAT}"
          done

          archive="dist/luci-app-acmesh-console_${VERSION}-${RELEASE}_${SDK}_${ARCH}.tar.gz"
          tar -C bundle -czf "$archive" "${FORMAT}-${ARCH}"
          (
            cd dist
            sha256sum *."$FORMAT" *.tar.gz > "SHA256SUMS-${FORMAT}-${ARCH}"
          )

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packages-${{ matrix.target.format }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Download all package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: packages-*
          path: release
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          cd release
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' |
            sort -z |
            xargs -0 sha256sum > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* \
              --title "luci-app-acmesh-console $VERSION" \
              --generate-notes
          fi

  publish-existing:
    name: Publish existing package artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.publish_run_id != ''
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Validate release request
        env:
          TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^PKG_VERSION:=//p' Makefile | head -n 1)"
          [[ -n "$TAG" ]]
          [[ "$TAG" == "v$version" ]]
          git rev-parse --verify "refs/tags/$TAG^{commit}"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Download existing package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: packages-*
          path: release
          merge-multiple: true
          run-id: ${{ inputs.publish_run_id }}
          github-token: ${{ github.token }}

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          cd release
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' |
            sort -z |
            xargs -0 sha256sum > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* \
              --title "luci-app-acmesh-console $VERSION" \
              --generate-notes
          fi
